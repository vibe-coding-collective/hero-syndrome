<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4EFE3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hero Syndrome" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/icon.svg" color="#B85A2E" />
    <title>Hero Syndrome · Music for ongoing life</title>
    <meta
      name="description"
      content="An adaptive score, generated live from your phone's signals. A session becomes an episode you can replay or send."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Hanken+Grotesk:wght@400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      // Belt-and-suspenders cache buster. Runs from every cached index.html
      // going forward. Forces a service worker update check on every load and
      // reloads the page when a new SW takes control. Same logic also lives
      // in main.tsx; this inline copy ensures it runs even if the bundled JS
      // is stale, failing to load, or hasn't reached this point yet.
      //
      // `?reset=1` is the nuclear escape hatch for users whose Chrome is
      // pinning a very old cached SW that refuses to update. It unregisters
      // every SW, deletes every Cache Storage entry, then bounces to /.
      (function () {
        if (new URLSearchParams(location.search).get('reset') === '1') {
          Promise.all([
            navigator.serviceWorker
              ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(regs.map(function (r) { return r.unregister(); }));
                })
              : Promise.resolve(),
            typeof caches !== 'undefined'
              ? caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                })
              : Promise.resolve(),
          ]).then(function () { location.replace(location.origin + '/'); });
          return;
        }
        if (!('serviceWorker' in navigator)) return;
        var reloading = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (reloading) return;
          reloading = true;
          window.location.reload();
        });
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (reg) { reg.update().catch(function () {}); });
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
